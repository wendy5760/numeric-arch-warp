<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      color-scheme: light dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 12px;
      line-height: 1.4;
      --bg: var(--figma-color-bg, #ffffff);
      --panel: var(--figma-color-bg-secondary, #f7f7f7);
      --text: var(--figma-color-text, #1f1f1f);
      --muted: var(--figma-color-text-secondary, #6b6b6b);
      --border: var(--figma-color-border, #d9d9d9);
      --brand: var(--figma-color-bg-brand, #0d99ff);
      --brand-text: var(--figma-color-text-onbrand, #ffffff);
      --danger: var(--figma-color-text-danger, #d92d20);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
    }

    .app {
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 100vh;
      padding: 14px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    h1 {
      margin: 0;
      font-size: 14px;
      font-weight: 650;
      letter-spacing: 0;
    }

    .status {
      min-height: 34px;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel);
      color: var(--muted);
    }

    .status.strong {
      color: var(--text);
    }

    .status.error {
      color: var(--danger);
    }

    .controls {
      display: grid;
      gap: 12px;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    .field-row {
      display: grid;
      grid-template-columns: 1fr 80px;
      gap: 8px;
      align-items: center;
    }

    label {
      color: var(--muted);
      font-size: 11px;
      font-weight: 550;
    }

    input,
    select,
    button {
      font: inherit;
      letter-spacing: 0;
    }

    input[type="range"] {
      width: 100%;
      margin: 0;
      accent-color: var(--brand);
    }

    input[type="number"],
    select {
      width: 100%;
      min-height: 30px;
      padding: 6px 8px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg);
      color: var(--text);
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .actions .wide {
      grid-column: 1 / -1;
    }

    button {
      min-height: 32px;
      padding: 7px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg);
      color: var(--text);
      cursor: pointer;
    }

    button.primary {
      border-color: var(--brand);
      background: var(--brand);
      color: var(--brand-text);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.45;
    }

    .preview-shell {
      display: grid;
      gap: 8px;
      min-height: 168px;
    }

    .preview-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      color: var(--muted);
      font-size: 11px;
    }

    .preview {
      display: grid;
      place-items: center;
      min-height: 144px;
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 8px;
      background:
        linear-gradient(45deg, rgba(128, 128, 128, 0.12) 25%, transparent 25%),
        linear-gradient(-45deg, rgba(128, 128, 128, 0.12) 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, rgba(128, 128, 128, 0.12) 75%),
        linear-gradient(-45deg, transparent 75%, rgba(128, 128, 128, 0.12) 75%);
      background-position: 0 0, 0 8px, 8px -8px, -8px 0;
      background-size: 16px 16px;
    }

    canvas {
      display: block;
      width: 100%;
      height: auto;
      max-height: 260px;
      object-fit: contain;
    }

    .empty {
      padding: 16px;
      color: var(--muted);
      text-align: center;
    }

    .meta {
      color: var(--muted);
      font-size: 11px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <h1>Numeric Arch Warp</h1>
      <select id="scale" title="Export scale">
        <option value="1">1x</option>
        <option value="2" selected>2x</option>
        <option value="3">3x</option>
        <option value="4">4x</option>
      </select>
    </header>

    <div id="status" class="status">Select a frame or image, then load it.</div>

    <section class="controls">
      <div class="field">
        <div class="field-row">
          <label for="bendRange">Bend amount (%)</label>
          <input id="bendNumber" type="number" min="-90" max="90" step="1" value="22">
        </div>
        <input id="bendRange" type="range" min="-90" max="90" step="1" value="22">
      </div>

      <div class="field">
        <div class="field-row">
          <label for="curveRange">Curve shape</label>
          <input id="curveNumber" type="number" min="0.5" max="6" step="0.1" value="2">
        </div>
        <input id="curveRange" type="range" min="0.5" max="6" step="0.1" value="2">
      </div>

      <div class="field">
        <div class="field-row">
          <label for="segmentsRange">Sampling segments</label>
          <input id="segmentsNumber" type="number" min="16" max="1024" step="1" value="256">
        </div>
        <input id="segmentsRange" type="range" min="16" max="1024" step="1" value="256">
      </div>
    </section>

    <section class="preview-shell">
      <div class="preview-header">
        <span>Preview</span>
        <span id="outputMeta">-</span>
      </div>
      <div class="preview">
        <canvas id="previewCanvas" hidden></canvas>
        <div id="emptyPreview" class="empty">No source loaded</div>
      </div>
      <div id="sourceMeta" class="meta">-</div>
    </section>

    <section class="actions">
      <button id="loadButton" class="wide">Load selection</button>
      <button id="createButton" class="primary" disabled>Create copy</button>
      <button id="updateButton" disabled>Update selected result</button>
    </section>
  </main>

  <script>
    const state = {
      source: null,
      bitmap: null,
      preset: null,
      hasTarget: false,
      renderQueued: false,
      renderResult: null
    };

    const MAX_FIGMA_IMAGE_EDGE = 4096;
    const MAX_FIGMA_IMAGE_PIXELS = 12000000;

    const els = {
      status: document.getElementById("status"),
      scale: document.getElementById("scale"),
      bendRange: document.getElementById("bendRange"),
      bendNumber: document.getElementById("bendNumber"),
      curveRange: document.getElementById("curveRange"),
      curveNumber: document.getElementById("curveNumber"),
      segmentsRange: document.getElementById("segmentsRange"),
      segmentsNumber: document.getElementById("segmentsNumber"),
      previewCanvas: document.getElementById("previewCanvas"),
      emptyPreview: document.getElementById("emptyPreview"),
      outputMeta: document.getElementById("outputMeta"),
      sourceMeta: document.getElementById("sourceMeta"),
      loadButton: document.getElementById("loadButton"),
      createButton: document.getElementById("createButton"),
      updateButton: document.getElementById("updateButton")
    };

    bindPair(els.bendRange, els.bendNumber, -90, 90);
    bindPair(els.curveRange, els.curveNumber, 0.5, 6);
    bindPair(els.segmentsRange, els.segmentsNumber, 16, 1024);

    els.loadButton.addEventListener("click", () => {
      setStatus("Loading the current selection...");
      post({
        type: "load-selection",
        scale: Number(els.scale.value)
      });
    });

    els.createButton.addEventListener("click", async () => {
      await sendRenderedImage("create-warp");
    });

    els.updateButton.addEventListener("click", async () => {
      await sendRenderedImage("update-warp");
    });

    window.onmessage = async (event) => {
      const message = event.data.pluginMessage;
      if (!message) {
        return;
      }

      if (message.type === "ready") {
        if (message.lastParams) {
          setParams(message.lastParams);
        }
        return;
      }

      if (message.type === "selection-summary") {
        state.hasTarget = message.hasTarget;
        updateButtons();
        return;
      }

      if (message.type === "preset-loaded") {
        state.hasTarget = true;
        state.preset = message.preset;
        setParams(message.preset.params);
        setStatus("Settings loaded: " + message.targetName, "strong");
        updateButtons();
        return;
      }

      if (message.type === "target-cleared") {
        state.hasTarget = false;
        state.preset = null;
        updateButtons();
        return;
      }

      if (message.type === "source-loaded") {
        state.source = message.source;
        state.bitmap = await decodeImage(message.bytes);
        state.source.pixelWidth = state.bitmap.width;
        state.source.pixelHeight = state.bitmap.height;
        const fitNote = message.source.autoScaled
          ? " (auto-fit " + formatScale(message.source.scale) + " from " + formatScale(message.source.requestedScale) + ")"
          : "";
        setStatus("Loaded: " + message.source.name + fitNote, "strong");
        updateSourceMeta();
        queueRender();
        updateButtons();
        return;
      }

      if (message.type === "source-missing") {
        state.source = null;
        state.bitmap = null;
        clearPreview();
        setStatus(message.message);
        updateButtons();
        return;
      }

      if (message.type === "preset-saved") {
        state.hasTarget = true;
        state.preset = message.preset;
        setStatus("Settings saved: " + message.targetName, "strong");
        updateButtons();
        return;
      }

      if (message.type === "error") {
        setStatus(message.message, "error");
      }
    };

    function bindPair(range, number, min, max) {
      const sync = (from, to) => {
        const value = clamp(Number(from.value), min, max);
        to.value = String(value);
        from.value = String(value);
        queueRender();
      };
      range.addEventListener("input", () => sync(range, number));
      number.addEventListener("input", () => sync(number, range));
    }

    function setParams(params) {
      const normalized = normalizeParams(params);
      els.bendRange.value = String(normalized.bendPercent);
      els.bendNumber.value = String(normalized.bendPercent);
      els.curveRange.value = String(normalized.curvePower);
      els.curveNumber.value = String(normalized.curvePower);
      els.segmentsRange.value = String(normalized.segments);
      els.segmentsNumber.value = String(normalized.segments);
      queueRender();
    }

    function getParams() {
      return normalizeParams({
        bendPercent: Number(els.bendNumber.value),
        curvePower: Number(els.curveNumber.value),
        segments: Number(els.segmentsNumber.value)
      });
    }

    function normalizeParams(params) {
      return {
        bendPercent: clamp(Number(params.bendPercent ?? 22), -90, 90),
        curvePower: clamp(Number(params.curvePower ?? 2), 0.5, 6),
        segments: Math.round(clamp(Number(params.segments ?? 256), 16, 1024))
      };
    }

    function queueRender() {
      if (!state.bitmap || state.renderQueued) {
        return;
      }
      state.renderQueued = true;
      requestAnimationFrame(() => {
        state.renderQueued = false;
        renderWarp();
      });
    }

    function renderWarp() {
      if (!state.bitmap || !state.source) {
        clearPreview();
        return;
      }

      const params = getParams();
      const canvas = els.previewCanvas;
      const ctx = canvas.getContext("2d");
      const image = state.bitmap;
      const sourcePixelWidth = Math.max(1, image.width);
      const sourcePixelHeight = Math.max(1, image.height);
      const sourceBendPx = (params.bendPercent / 100) * sourcePixelHeight;
      const sourceOutputHeight = sourcePixelHeight + Math.abs(sourceBendPx);
      const safeRaster = getSafeRasterSize(sourcePixelWidth, sourceOutputHeight);
      const rasterScale = safeRaster.scale;
      const width = Math.max(1, Math.floor(sourcePixelWidth * rasterScale));
      const height = Math.max(1, Math.floor(sourcePixelHeight * rasterScale));
      const bendExact = (params.bendPercent / 100) * sourcePixelHeight * rasterScale;
      const bendPx = bendExact >= 0 ? Math.floor(bendExact) : Math.ceil(bendExact);
      const topPadPx = Math.max(bendPx, 0);
      const outputHeight = height + Math.abs(bendPx);
      const segmentCount = Math.min(width, params.segments);

      canvas.width = width;
      canvas.height = Math.max(1, outputHeight);
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = "high";

      for (let i = 0; i < segmentCount; i += 1) {
        const rawX1 = i * sourcePixelWidth / segmentCount;
        const rawX2 = (i + 1) * sourcePixelWidth / segmentCount;
        const dx1 = Math.floor(i * width / segmentCount);
        const dx2 = i === segmentCount - 1 ? width : Math.ceil((i + 1) * width / segmentCount);
        const dw = Math.max(1, dx2 - dx1);
        const sx = Math.max(0, Math.floor(rawX1) - 1);
        const sx2 = Math.min(sourcePixelWidth, Math.ceil(rawX2) + 1);
        const sw = Math.max(1, sx2 - sx);
        const mid = ((rawX1 + rawX2) / 2 / sourcePixelWidth) * 2 - 1;
        const curve = 1 - Math.pow(Math.abs(mid), params.curvePower);
        const dy = topPadPx - bendPx * Math.max(0, Math.min(1, curve));
        ctx.drawImage(image, sx, 0, sw, sourcePixelHeight, dx1, dy, dw, height);
      }

      const designBend = state.source.height * params.bendPercent / 100;
      const outputDesignHeight = state.source.height + Math.abs(designBend);
      state.renderResult = {
        canvas,
        params,
        outputWidth: state.source.width,
        outputHeight: outputDesignHeight,
        topOffset: Math.max(designBend, 0),
        rasterWidth: canvas.width,
        rasterHeight: canvas.height,
        rasterScale
      };

      els.previewCanvas.hidden = false;
      els.emptyPreview.hidden = true;
      const designMeta = Math.round(state.source.width) + " x " + Math.round(outputDesignHeight);
      const rasterMeta = canvas.width + " x " + canvas.height + " px";
      els.outputMeta.textContent = rasterScale < 0.999
        ? designMeta + " · auto-fit " + rasterMeta
        : designMeta + " · " + rasterMeta;
    }

    async function sendRenderedImage(type) {
      if (!state.renderResult) {
        setStatus("Load a source and generate a preview first.", "error");
        return;
      }

      setStatus(type === "create-warp" ? "Creating copy..." : "Updating result...");
      const blob = await canvasToPngBlob(state.renderResult.canvas);
      const bytes = new Uint8Array(await blob.arrayBuffer());
      post({
        type,
        bytes,
        params: state.renderResult.params,
        outputWidth: state.renderResult.outputWidth,
        outputHeight: state.renderResult.outputHeight,
        topOffset: state.renderResult.topOffset,
        rasterWidth: state.renderResult.rasterWidth,
        rasterHeight: state.renderResult.rasterHeight,
        rasterScale: state.renderResult.rasterScale
      });
    }

    function clearPreview() {
      const canvas = els.previewCanvas;
      const ctx = canvas.getContext("2d");
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      canvas.hidden = true;
      els.emptyPreview.hidden = false;
      els.outputMeta.textContent = "-";
      els.sourceMeta.textContent = "-";
      state.renderResult = null;
    }

    async function decodeImage(bytes) {
      const blob = new Blob([bytes], { type: "image/png" });
      if ("createImageBitmap" in window) {
        return await createImageBitmap(blob);
      }

      return await new Promise((resolve, reject) => {
        const image = new Image();
        const url = URL.createObjectURL(blob);
        image.onload = () => {
          URL.revokeObjectURL(url);
          resolve(image);
        };
        image.onerror = () => {
          URL.revokeObjectURL(url);
          reject(new Error("Could not decode the source image."));
        };
        image.src = url;
      });
    }

    function canvasToPngBlob(canvas) {
      return new Promise((resolve, reject) => {
        canvas.toBlob((blob) => {
          if (blob) {
            resolve(blob);
          } else {
            reject(new Error("Could not generate a PNG."));
          }
        }, "image/png");
      });
    }

    function updateSourceMeta() {
      if (!state.source) {
        els.sourceMeta.textContent = "-";
        return;
      }
      els.sourceMeta.textContent = state.source.name + " · " +
        Math.round(state.source.width) + " x " + Math.round(state.source.height) +
        " · source " + (state.source.pixelWidth || "-") + " x " + (state.source.pixelHeight || "-") + " px" +
        " · " + formatScale(state.source.scale) +
        (state.source.autoScaled ? " auto-fit" : "");
    }

    function updateButtons() {
      const hasSource = Boolean(state.source && state.bitmap);
      els.createButton.disabled = !hasSource;
      els.updateButton.disabled = !(hasSource && state.hasTarget);
    }

    function setStatus(text, tone) {
      els.status.textContent = text;
      els.status.className = "status" + (tone ? " " + tone : "");
    }

    function clamp(value, min, max) {
      if (!Number.isFinite(value)) {
        return min;
      }
      return Math.min(max, Math.max(min, value));
    }

    function getSafeRasterSize(width, height) {
      const safeScale = Math.min(
        1,
        MAX_FIGMA_IMAGE_EDGE / Math.max(1, width),
        MAX_FIGMA_IMAGE_EDGE / Math.max(1, height),
        Math.sqrt(MAX_FIGMA_IMAGE_PIXELS / Math.max(1, width * height))
      );
      return {
        width: Math.max(1, Math.floor(width * safeScale)),
        height: Math.max(1, Math.floor(height * safeScale)),
        scale: safeScale
      };
    }

    function formatScale(value) {
      const number = Number(value);
      if (!Number.isFinite(number)) {
        return "-";
      }
      if (number >= 1) {
        return number.toFixed(number % 1 === 0 ? 0 : 2) + "x";
      }
      return number.toFixed(2).replace(/0$/, "") + "x";
    }

    function post(pluginMessage) {
      parent.postMessage({ pluginMessage }, "*");
    }
  </script>
</body>
</html>
